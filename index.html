<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books — nakliOS</title>
<meta name="description" content="Browser-native reader for ePub, PDF, MOBI, AZW3, FB2 and plain text. Part of nakliOS.">
<style>
/* Mumbai art deco — Marine Drive cream + teal-black + burnt sienna.
   Host theme via naklios.theme.onChange can override at runtime. */
:root {
  --body:  #e8d9b3;  /* aged-cream facade */
  --panel: #f3e7c4;  /* lighter cream, for cards */
  --ink:   #2c3e3a;  /* deep teal-black */
  --brand: #b85c3a;  /* burnt sienna */
  --row:   #ddc89a;  /* warmer cream, for rows */
  --muted: #7a6850;  /* warm gray-brown */
  --line:  #c9b582;  /* earthen */
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; height: 100%;
  background: var(--body); color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
  font-size: 14px;
}
body { display: flex; flex-direction: column; }

.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px;
  border-bottom: 1px solid var(--line);
  flex: 0 0 auto;
  background: var(--panel);
}
.topbar .title {
  display: flex; align-items: center; gap: 8px;
  font-size: 15px; font-weight: 600;
}
.topbar .title .glyph { font-size: 18px; }
.topbar .status { font-size: 11px; color: var(--muted); }

.main {
  flex: 1 1 auto;
  overflow: auto;
  padding: 20px;
  min-height: 0;
}

.center {
  min-height: 100%;
  display: flex; align-items: center; justify-content: center;
}
.card {
  max-width: 520px;
  padding: 32px 36px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 14px;
  text-align: left;
}
.card .tag {
  display: inline-block;
  font-size: 10px; padding: 2px 7px;
  background: color-mix(in srgb, var(--brand) 22%, transparent);
  color: var(--brand);
  border-radius: 4px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
  margin-bottom: 14px;
}
.card h2 {
  margin: 0 0 8px; font-size: 18px; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
}
.card p { color: var(--muted); line-height: 1.55; margin: 8px 0; }
.card code {
  background: var(--row);
  padding: 1px 5px; border-radius: 3px;
  font-family: ui-monospace, "SF Mono", monospace; font-size: 12px;
  color: var(--ink);
}

.dropzone {
  display: block;
  margin-top: 18px;
  border: 2px dashed var(--line);
  border-radius: 12px;
  padding: 36px 20px;
  text-align: center;
  color: var(--muted);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.dropzone:hover, .dropzone.drag-over {
  border-color: var(--brand);
  background: color-mix(in srgb, var(--brand) 8%, transparent);
}
.dropzone input[type=file] { display: none; }
.dropzone .formats { font-size: 11px; margin-top: 6px; opacity: 0.85; }

.library { display: grid; gap: 6px; }
.library .row {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 12px 14px;
  background: var(--row);
  border: 1px solid var(--line);
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.1s, border-color 0.1s;
}
.library .row:hover {
  background: color-mix(in srgb, var(--brand) 12%, var(--row));
  border-color: color-mix(in srgb, var(--brand) 30%, var(--line));
}
.library .row-text {
  flex: 1 1 auto;
  min-width: 0;
  padding-right: 14px;
}
.library .row .name {
  font-size: 14px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: var(--ink);
}
.library .row .author {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.library .row-meta {
  flex: 0 0 auto;
  text-align: right;
  display: flex; flex-direction: column; align-items: flex-end;
  gap: 3px;
}
.library .row .last-read {
  font-size: 10px;
  color: var(--brand);
  font-weight: 500;
}
.library .row .meta {
  font-size: 10px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.05em;
}

/* === Reader view === */
.reader { position: fixed; inset: 0; background: var(--body); display: none; flex-direction: column; z-index: 10; }
.reader.is-open { display: flex; }
.reader-header {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px; border-bottom: 1px solid var(--line);
  background: var(--panel); flex: 0 0 auto;
}
.reader-header .back,
.reader-header .nav-btn {
  background: transparent; color: var(--ink); border: 1px solid var(--line);
  padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
  font-family: inherit; line-height: 1;
}
.reader-header .nav-btn { padding: 6px 10px; font-size: 14px; }
.reader-header .back:hover,
.reader-header .nav-btn:hover { background: var(--row); border-color: var(--brand); }
.reader-header .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.reader-header .reader-title {
  flex: 1 1 auto; font-size: 14px; font-weight: 500;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.reader-header .status { font-size: 11px; color: var(--muted); }
.reader-header .sidebar-toggle {
  background: transparent; color: var(--ink); border: 1px solid var(--line);
  padding: 6px 10px; border-radius: 6px; cursor: pointer;
  font-size: 16px; line-height: 1; font-family: inherit;
}
.reader-header .sidebar-toggle:hover { background: var(--row); border-color: var(--brand); }
.reader-header .sidebar-toggle.is-active { background: var(--brand); color: var(--panel); border-color: var(--brand); }

.reader-body {
  flex: 1 1 auto;
  position: relative;
  overflow: hidden;
  min-height: 0;
}
.reader-content { position: absolute; inset: 0; overflow: hidden; }
.reader-content > * { position: absolute; inset: 0; }

/* Sidebar — slides in from right, overlays the engine view */
.sidebar {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 320px;
  background: var(--panel);
  border-left: 1px solid var(--line);
  overflow-y: auto;
  padding: 20px 22px 24px;
  transform: translateX(100%);
  transition: transform 0.18s ease-out;
  z-index: 2;
  box-shadow: -2px 0 12px rgba(0, 0, 0, 0.06);
}
.sidebar.is-open { transform: translateX(0); }
.sidebar-section { margin-bottom: 24px; }
.sidebar-section:last-child { margin-bottom: 0; }
.sidebar-label {
  display: block;
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 10px;
}
.add-bookmark {
  width: 100%;
  padding: 10px 14px;
  background: var(--brand);
  color: var(--panel);
  border: none; border-radius: 6px; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 600;
}
.add-bookmark:hover { opacity: 0.92; }
.add-bookmark:disabled { opacity: 0.4; cursor: not-allowed; }
.bookmarks { list-style: none; margin: 14px 0 0; padding: 0; }
.bookmarks .bm-empty {
  color: var(--muted); font-size: 12px; font-style: italic;
  padding: 8px 2px;
}
.bookmarks li:not(.bm-empty) {
  display: flex; align-items: center; gap: 6px;
  padding: 9px 6px;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  border-radius: 4px;
}
.bookmarks li:not(.bm-empty):hover { background: var(--row); }
.bookmarks li .bm-label {
  flex: 1 1 auto;
  font-size: 13px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.bookmarks li .bm-meta {
  font-size: 10px; color: var(--muted);
  flex: 0 0 auto;
}
.bookmarks li .bm-btn {
  background: none; border: none;
  color: var(--muted); cursor: pointer;
  font-size: 13px; padding: 2px 6px; line-height: 1;
  border-radius: 3px;
  flex: 0 0 auto;
}
.bookmarks li .bm-btn:hover { color: var(--brand); background: rgba(0,0,0,0.04); }
.note-area {
  width: 100%;
  min-height: 200px;
  padding: 12px 14px;
  background: var(--body);
  color: var(--ink);
  border: 1px solid var(--line);
  border-radius: 6px;
  resize: vertical;
  font-family: Georgia, "Iowan Old Style", serif;
  font-size: 14px; line-height: 1.55;
  box-sizing: border-box;
}
.note-area:focus { outline: 2px solid color-mix(in srgb, var(--brand) 50%, transparent); outline-offset: -1px; }

/* TOC list — nested chapter tree */
.toc { list-style: none; margin: 0; padding: 0; }
.toc li { margin: 0; }
.toc ul { list-style: none; margin: 0; padding-left: 14px; }
.toc .toc-item {
  display: block; width: 100%;
  background: transparent; border: none; padding: 7px 6px;
  color: var(--ink); font-family: inherit; font-size: 13px;
  text-align: left; cursor: pointer;
  border-radius: 4px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  line-height: 1.35;
}
.toc .toc-item:hover { background: var(--row); color: var(--brand); }

/* Library header — "+ Add book" affordance above the row list */
.library-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.add-btn {
  background: var(--brand); color: var(--panel);
  border: none; border-radius: 6px;
  padding: 8px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.add-btn:hover { opacity: 0.92; }
.add-btn.compact { padding: 7px 12px; font-size: 12px; }
.add-btn-secondary {
  background: transparent; color: var(--ink);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 9px 16px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  margin-top: 14px;
}
.add-btn-secondary:hover { background: var(--row); border-color: var(--brand); }

/* Full-window drop overlay — visible while user is dragging a file in */
.drop-overlay {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: color-mix(in srgb, var(--brand) 25%, var(--body));
  z-index: 50;
  pointer-events: none;
}
.drop-overlay-card {
  padding: 40px 60px;
  background: var(--panel);
  border: 3px dashed var(--brand);
  border-radius: 16px;
  text-align: center;
  max-width: 420px;
}
.drop-overlay .glyph { font-size: 44px; margin-bottom: 14px; color: var(--brand); line-height: 1; }
.drop-overlay .msg { font-size: 17px; color: var(--ink); font-weight: 600; }
.drop-overlay .sub { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; }

/* Bottom-centered toast — feedback for adds, errors, etc. */
.toast {
  position: fixed;
  left: 50%; bottom: 28px;
  transform: translateX(-50%) translateY(8px);
  background: var(--ink); color: var(--panel);
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 13px; font-weight: 500;
  box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
  z-index: 200;
  opacity: 0;
  transition: opacity 0.18s ease-out, transform 0.18s ease-out;
  pointer-events: none;
  max-width: min(80vw, 480px);
}
.toast.is-visible { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.is-error { background: var(--brand); }

.loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted); font-size: 13px;
}
.reader-error {
  padding: 40px 20px; max-width: 520px; margin: 0 auto;
  color: var(--muted); line-height: 1.55;
}
.reader-error h3 { color: var(--ink); margin: 0 0 10px; }
.reader-error code {
  background: var(--row); padding: 1px 5px; border-radius: 3px;
  font-family: ui-monospace, monospace; font-size: 12px; color: var(--ink);
}
</style>
</head>
<body>

<!-- Persistent file picker — triggered from "Add book" buttons in any view -->
<input type="file" id="library-fileinput" multiple
       accept=".epub,.pdf,.mobi,.azw3,.fb2,.txt,.md,.html,.htm" hidden>

<!-- Full-window drop overlay — appears on drag-enter outside the reader -->
<div class="drop-overlay" id="drop-overlay" hidden>
  <div class="drop-overlay-card">
    <div class="glyph">＋</div>
    <div class="msg" id="drop-msg">Drop to add to your library</div>
    <div class="sub">ePub · PDF · MOBI · AZW3 · FB2 · TXT · MD · HTML</div>
  </div>
</div>

<!-- Toast — feedback for adds + errors -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<div class="topbar" id="topbar">
  <div class="title"><span class="glyph">📖</span> Books</div>
  <div class="status" id="topbar-status">Loading…</div>
</div>

<div class="main" id="main"><!-- view rendered by JS --></div>

<div class="reader" id="reader" aria-hidden="true">
  <div class="reader-header">
    <button class="back" id="back-btn" type="button">← Library</button>
    <button class="nav-btn" id="prev-btn" type="button" hidden aria-label="Previous" title="Previous (←)">◀</button>
    <button class="nav-btn" id="next-btn" type="button" hidden aria-label="Next" title="Next (→ or Space)">▶</button>
    <div class="reader-title" id="reader-title">…</div>
    <div class="status" id="reader-status"></div>
    <button class="sidebar-toggle" id="sidebar-toggle" type="button" hidden aria-label="Notes &amp; bookmarks">≡</button>
  </div>
  <div class="reader-body">
    <div class="reader-content" id="reader-content"><!-- engine renders here --></div>
    <aside class="sidebar" id="sidebar" aria-hidden="true">
      <div class="sidebar-section" id="toc-section" hidden>
        <label class="sidebar-label">Contents</label>
        <ul class="toc" id="toc-list"></ul>
      </div>
      <div class="sidebar-section">
        <button class="add-bookmark" id="add-bookmark-btn" type="button">＋ Bookmark this spot</button>
        <ul class="bookmarks" id="bookmarks-list"></ul>
      </div>
      <div class="sidebar-section">
        <label class="sidebar-label" for="note-area">Note</label>
        <textarea class="note-area" id="note-area" placeholder="Your thoughts on this book…"></textarea>
      </div>
    </aside>
  </div>
</div>

<!--
  naklios.js — cooperative SDK for apps hosted inside nakliOS (Immersive mode).
  Vendored inline per the single-file ethos. Standalone-safe (no-ops when not hosted).
  Canonical source: https://naklios.dev/sdk/naklios.js. License: MIT.
-->
<script>
(function () {
  var inNakliOS = false;
  try { inNakliOS = !!(window.parent && window.parent !== window); } catch (_) {}
  var currentTheme = null;
  var themeListeners = new Set();
  var capListeners = new Set();
  var beforeCloseCb = null;
  var capabilities = { hosted: inNakliOS, version: 1, fs: false };
  var pendingRpc = new Map();
  var rpcCounter = 0;

  function send(type, data) {
    if (!inNakliOS) return;
    try {
      var msg = Object.assign({ type: type }, data || {});
      window.parent.postMessage(msg, '*');
    } catch (_) {}
  }
  function rpc(type, payload) {
    if (!inNakliOS) return Promise.reject(new Error('Not hosted — naklios.* unavailable standalone'));
    return new Promise(function (resolve, reject) {
      var requestId = 'r' + (++rpcCounter) + '_' + Date.now();
      pendingRpc.set(requestId, { resolve: resolve, reject: reject });
      send(type, Object.assign({ requestId: requestId }, payload || {}));
      setTimeout(function () {
        if (pendingRpc.has(requestId)) {
          pendingRpc.delete(requestId);
          reject(new Error('naklios RPC timeout: ' + type));
        }
      }, 30000);
    });
  }
  window.addEventListener('message', function (e) {
    var msg = e.data;
    if (!msg || typeof msg !== 'object') return;
    if (msg.type === 'naklios:theme') {
      currentTheme = { id: msg.theme, colors: msg.colors, mood: msg.mood };
      themeListeners.forEach(function (cb) { try { cb(currentTheme); } catch (_) {} });
    } else if (msg.type === 'naklios:beforeclose') {
      if (beforeCloseCb) { try { beforeCloseCb(); } catch (_) {} }
    } else if (msg.type === 'naklios:capabilities') {
      if (typeof msg.fs === 'boolean') capabilities.fs = msg.fs;
      capListeners.forEach(function (cb) { try { cb(capabilities); } catch (_) {} });
    } else if (msg.type === 'naklios:fs:reply' && msg.requestId) {
      var p = pendingRpc.get(msg.requestId);
      if (!p) return;
      pendingRpc.delete(msg.requestId);
      if (msg.error) p.reject(new Error(msg.error));
      else p.resolve(msg.result);
    }
  });
  window.naklios = {
    version: 1,
    capabilities: capabilities,
    ready: function () { send('naklios:ready'); },
    title: function (s) { send('naklios:title', { title: String(s) }); },
    close: function () { send('naklios:close'); },
    beforeClose: function (cb) { beforeCloseCb = typeof cb === 'function' ? cb : null; },
    theme: {
      get current() { return currentTheme; },
      onChange: function (cb) {
        if (typeof cb !== 'function') return function () {};
        themeListeners.add(cb);
        if (currentTheme) { try { cb(currentTheme); } catch (_) {} }
        return function () { themeListeners.delete(cb); };
      },
      request: function () { send('naklios:theme-request'); },
    },
    onCapabilitiesChange: function (cb) {
      if (typeof cb !== 'function') return function () {};
      capListeners.add(cb);
      try { cb(capabilities); } catch (_) {}
      return function () { capListeners.delete(cb); };
    },
    requestCapabilities: function () { send('naklios:capabilities-request'); },
    fs: {
      read:       function (path)       { return rpc('naklios:fs:read', { path: path }); },
      readBinary: function (path)       { return rpc('naklios:fs:readBinary', { path: path }); },
      write:      function (path, data) { return rpc('naklios:fs:write', { path: path, data: data }); },
      append:     function (path, line) { return rpc('naklios:fs:append', { path: path, line: line }); },
      list:       function (prefix)     { return rpc('naklios:fs:list', { prefix: prefix || '' }); },
      delete:     function (path)       { return rpc('naklios:fs:delete', { path: path }); },
      exists:     function (path)       { return rpc('naklios:fs:exists', { path: path }); },
    },
  };
})();
</script>

<!-- Books app boot + engines + persistence -->
<script type="module">
'use strict';

const VENDOR_FOLIATE = './vendor/foliate-js@1.0.1/';
const VENDOR_PDFJS   = './vendor/pdfjs-dist@5.7.284/';

const SUPPORTED_EXTS = ['epub','pdf','mobi','azw3','fb2','txt','md','html','htm'];
const ENGINE_BY_EXT = {
  epub:'foliate', mobi:'foliate', azw3:'foliate', fb2:'foliate',
  pdf:'pdf',
  txt:'text', md:'text', html:'text', htm:'text',
};

const root = document.getElementById('main');
const topbar = document.getElementById('topbar');
const topbarStatus = document.getElementById('topbar-status');
const reader = document.getElementById('reader');
const readerContent = document.getElementById('reader-content');
const readerTitle = document.getElementById('reader-title');
const readerStatus = document.getElementById('reader-status');
const backBtn = document.getElementById('back-btn');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
const sidebar = document.getElementById('sidebar');
const sidebarToggle = document.getElementById('sidebar-toggle');
const bookmarksList = document.getElementById('bookmarks-list');
const addBookmarkBtn = document.getElementById('add-bookmark-btn');
const noteArea = document.getElementById('note-area');
const tocSection = document.getElementById('toc-section');
const tocList = document.getElementById('toc-list');

let activeEngine = null;
let activeSidecar = null;    // sidecar object for the currently-open book; null if not persisted
let activeBookId = null;

// ============================================================
// Small helpers
// ============================================================

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function extOf(name) {
  const m = String(name || '').match(/\.([a-z0-9]+)$/i);
  return m ? m[1].toLowerCase() : '';
}
function engineKeyFor(filename) {
  return ENGINE_BY_EXT[extOf(filename)] || null;
}
function toArrayBuffer(raw) {
  if (raw instanceof ArrayBuffer) return raw;
  if (raw && raw.buffer instanceof ArrayBuffer) {
    return raw.buffer.slice(raw.byteOffset || 0, (raw.byteOffset || 0) + raw.byteLength);
  }
  if (typeof raw === 'string') return new TextEncoder().encode(raw).buffer;
  throw new Error('Unexpected response shape from naklios.fs.readBinary');
}

// A5 — bookId from filename: extension stripped, non-alnum → underscore, trim leading/trailing underscores.
function bookIdFor(filename) {
  return String(filename)
    .replace(/\.[a-z0-9]{2,5}$/i, '')
    .replace(/[^a-zA-Z0-9-]+/g, '_')
    .replace(/^_+|_+$/g, '') || 'book';
}

function formatRelativeTime(iso) {
  const t = iso ? Date.parse(iso) : 0;
  if (!t) return '';
  const diff = Date.now() - t;
  const s = Math.floor(diff / 1000);
  if (s < 60) return 'just now';
  const m = Math.floor(s / 60); if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
  const d = Math.floor(h / 24); if (d < 7)  return d + 'd ago';
  const w = Math.floor(d / 7);  if (w < 5)  return w + 'w ago';
  const mo = Math.floor(d / 30); if (mo < 12) return mo + 'mo ago';
  return Math.floor(d / 365) + 'y ago';
}

// ============================================================
// Sidecar I/O — apps/books/notes/<bookId>.json (A7 schema)
// ============================================================

async function sidecarExists(bookId) {
  try { return !!(await naklios.fs.exists('notes/' + bookId + '.json')); }
  catch (_) { return false; }
}

async function readSidecar(bookId) {
  try {
    const path = 'notes/' + bookId + '.json';
    if (!(await naklios.fs.exists(path))) return null;
    const txt = await naklios.fs.read(path);
    const obj = JSON.parse(txt);
    return (obj && typeof obj === 'object') ? obj : null;
  } catch (err) {
    console.warn('Books: sidecar read failed for', bookId, err);
    return null;
  }
}

// Pending writes are coalesced per bookId — rapid relocate events get one write.
const pendingWrites = new Map();   // bookId → { timer, data }

function writeSidecarDebounced(bookId, data) {
  const existing = pendingWrites.get(bookId);
  if (existing) clearTimeout(existing.timer);
  const timer = setTimeout(() => {
    pendingWrites.delete(bookId);
    naklios.fs.write('notes/' + bookId + '.json', JSON.stringify(data, null, 2))
      .catch((err) => console.warn('Books: sidecar write failed for', bookId, err));
  }, 1000);
  pendingWrites.set(bookId, { timer, data });
}

function flushPendingWritesSync() {
  // Fire writes immediately (we still can't wait on them in beforeunload,
  // but firing the RPC ensures the host receives the postMessage).
  for (const [bookId, { timer, data }] of pendingWrites.entries()) {
    clearTimeout(timer);
    naklios.fs.write('notes/' + bookId + '.json', JSON.stringify(data, null, 2))
      .catch((err) => console.warn('Books: sidecar flush failed for', bookId, err));
  }
  pendingWrites.clear();
}

// Resolve a bookId for `filename`, allocating a `_2`, `_3`, ... suffix if a
// sidecar already exists for a different source filename (A5 collision rule).
async function resolveBookId(filename) {
  const base = bookIdFor(filename);
  let candidate = base;
  for (let n = 1; n <= 50; n++) {
    const existing = await readSidecar(candidate);
    if (!existing) return candidate;
    if (existing.sourceFilename === filename) return candidate;
    n++;
    candidate = base + '_' + n;
  }
  throw new Error('Too many bookId collisions for ' + filename);
}

function makeInitialSidecar({ bookId, sourceFilename, engineKey }) {
  return {
    bookId,
    sourceFilename,
    title: sourceFilename.replace(/\.[a-z0-9]+$/i, ''),
    author: null,
    format: extOf(sourceFilename),
    engine: engineKey,
    position: null,
    lastOpened: null,
    note: '',
    bookmarks: [],
  };
}

// ============================================================
// Engine adapters — load / getPosition / jumpTo / getMetadata / onRelocate / destroy
// ============================================================

class FoliateEngine {
  static engineKey = 'foliate';
  constructor(container) {
    this.container = container;
    this.view = null;
    this._cb = null;
    this._loaded = null;
  }
  async load(file) {
    await import(VENDOR_FOLIATE + 'view.js');
    this.view = document.createElement('foliate-view');
    Object.assign(this.view.style, { display: 'block', width: '100%', height: '100%' });
    this.container.appendChild(this.view);
    this.view.addEventListener('relocate', () => {
      if (this._cb) this._cb(this.getPosition());
    });
    await this.view.open(file);
    // open() parses the book but doesn't start the paginator. init() does —
    // without it, foliate-paginator never paints. jumpTo() (called by the
    // outer flow if a saved position exists) will reposition immediately.
    try { await this.view.init({ showTextStart: true }); }
    catch (_) { try { await this.view.next?.(); } catch (_) {} }
    this._loaded = true;
  }
  getPosition() {
    const loc = this.view && this.view.lastLocation;
    if (!loc) return { fraction: 0, sectionIndex: 0 };
    const idx = (loc.tocItem && typeof loc.tocItem.index === 'number')
      ? loc.tocItem.index : (loc.index || 0);
    const out = { fraction: loc.fraction || 0, sectionIndex: idx };
    if (loc.cfi) out.cfi = loc.cfi;
    return out;
  }
  async jumpTo(position) {
    if (!this.view || !position) return;
    if (position.cfi) {
      try { await this.view.goTo(position.cfi); return; } catch (_) {}
    }
    if (typeof position.fraction === 'number') {
      try { await this.view.goToFraction(position.fraction); } catch (_) {}
    }
  }
  async getMetadata() {
    const m = (this.view && this.view.book && this.view.book.metadata) || {};
    let title = null, author = null;
    if (typeof m.title === 'string') title = m.title;
    else if (Array.isArray(m.title) && m.title.length) title = String(m.title[0] || '') || null;
    const creator = m.creator != null ? m.creator : m.author;
    if (typeof creator === 'string') author = creator;
    else if (Array.isArray(creator)) {
      author = creator
        .map((c) => (typeof c === 'string' ? c : (c && (c.name || c.value)) || ''))
        .filter(Boolean).join(', ') || null;
    } else if (creator && typeof creator === 'object') {
      author = creator.name || creator.value || null;
    }
    return { title, author };
  }
  async next() { if (this.view) { try { await this.view.next(); } catch (_) {} } }
  async prev() { if (this.view) { try { await this.view.prev(); } catch (_) {} } }
  async getTOC() {
    const toc = this.view && this.view.book && this.view.book.toc;
    if (!Array.isArray(toc) || toc.length === 0) return null;
    function norm(items) {
      return items.map((it) => ({
        label: String(it.label || '').trim(),
        href: it.href || '',
        subitems: Array.isArray(it.subitems) && it.subitems.length ? norm(it.subitems) : null,
      })).filter((it) => it.label);
    }
    return norm(toc);
  }
  async jumpToTocItem(item) {
    if (!this.view || !item || !item.href) return;
    try { await this.view.goTo(item.href); } catch (_) {}
  }
  onRelocate(cb) { this._cb = cb; }
  destroy() {
    if (this.view) { try { this.container.removeChild(this.view); } catch (_) {} this.view = null; }
    this._cb = null;
  }
}

class PdfEngine {
  static engineKey = 'pdf';
  constructor(container) {
    this.container = container;
    this.viewer = null;
    this.pdfDoc = null;
    this.numPages = 0;
    this.currentPage = 1;
    this.scrollY = 0;
    this._cb = null;
    this._scrollT = null;
  }
  async load(file) {
    const pdfjs = await import(VENDOR_PDFJS + 'build/pdf.min.mjs');
    pdfjs.GlobalWorkerOptions.workerSrc = VENDOR_PDFJS + 'build/pdf.worker.min.mjs';
    const data = await file.arrayBuffer();
    this.pdfDoc = await pdfjs.getDocument({
      data: data,
      cMapUrl: VENDOR_PDFJS + 'cmaps/',
      cMapPacked: true,
      standardFontDataUrl: VENDOR_PDFJS + 'standard_fonts/',
    }).promise;
    this.numPages = this.pdfDoc.numPages;

    this.viewer = document.createElement('div');
    Object.assign(this.viewer.style, {
      overflowY: 'auto', overflowX: 'hidden',
      height: '100%', width: '100%',
      padding: '20px 0', background: 'var(--body)',
    });
    this.container.appendChild(this.viewer);

    for (let i = 1; i <= this.numPages; i++) {
      await this._renderPage(i);
    }
    this.viewer.addEventListener('scroll', () => this._onScroll());
  }
  async _renderPage(num) {
    const page = await this.pdfDoc.getPage(num);
    const dpr = window.devicePixelRatio || 1;
    const baseVp = page.getViewport({ scale: 1 });
    const avail = Math.max(320, this.viewer.clientWidth - 40);
    const scale = (avail / baseVp.width) * dpr;
    const vp = page.getViewport({ scale: scale });
    const canvas = document.createElement('canvas');
    canvas.width = vp.width;
    canvas.height = vp.height;
    canvas.dataset.pageNum = String(num);
    Object.assign(canvas.style, {
      display: 'block', margin: '8px auto',
      width: (vp.width / dpr) + 'px', height: (vp.height / dpr) + 'px',
      boxShadow: '0 2px 12px rgba(0,0,0,0.25)', background: '#fff',
    });
    this.viewer.appendChild(canvas);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
  }
  _onScroll() {
    const canvases = this.viewer.querySelectorAll('canvas[data-page-num]');
    const top = this.viewer.scrollTop;
    for (let i = 0; i < canvases.length; i++) {
      const c = canvases[i];
      const bottom = c.offsetTop + c.offsetHeight;
      if (bottom > top) {
        this.currentPage = Number(c.dataset.pageNum);
        const h = c.offsetHeight || 1;
        this.scrollY = Math.max(0, Math.min(1, (top - c.offsetTop) / h));
        break;
      }
    }
    if (this._scrollT) clearTimeout(this._scrollT);
    this._scrollT = setTimeout(() => {
      if (this._cb) this._cb(this.getPosition());
    }, 300);
  }
  getPosition() { return { page: this.currentPage, scrollY: this.scrollY }; }
  async jumpTo(position) {
    if (!this.viewer || !position) return;
    const page = Math.max(1, Math.min(this.numPages || 1, position.page || 1));
    const scrollY = Math.max(0, Math.min(1, position.scrollY || 0));
    const canvas = this.viewer.querySelector('canvas[data-page-num="' + page + '"]');
    if (!canvas) return;
    this.viewer.scrollTop = canvas.offsetTop + (scrollY * canvas.offsetHeight);
  }
  async getMetadata() {
    if (!this.pdfDoc) return {};
    try {
      const md = await this.pdfDoc.getMetadata();
      const info = (md && md.info) || {};
      return {
        title: typeof info.Title === 'string' && info.Title ? info.Title : null,
        author: typeof info.Author === 'string' && info.Author ? info.Author : null,
      };
    } catch (_) { return {}; }
  }
  async next() {
    if (!this.viewer || !this.numPages) return;
    if (this.currentPage >= this.numPages) return;
    await this.jumpTo({ page: this.currentPage + 1, scrollY: 0 });
  }
  async prev() {
    if (!this.viewer) return;
    if (this.currentPage <= 1) return;
    await this.jumpTo({ page: this.currentPage - 1, scrollY: 0 });
  }
  async getTOC() {
    if (!this.pdfDoc) return null;
    let outline = null;
    try { outline = await this.pdfDoc.getOutline(); } catch (_) {}
    if (!Array.isArray(outline) || outline.length === 0) return null;
    const doc = this.pdfDoc;
    async function resolve(item) {
      let pageNum = null;
      try {
        const dest = typeof item.dest === 'string'
          ? await doc.getDestination(item.dest)
          : item.dest;
        if (Array.isArray(dest) && dest[0]) {
          pageNum = (await doc.getPageIndex(dest[0])) + 1;
        }
      } catch (_) {}
      return {
        label: String(item.title || '').trim(),
        href: pageNum ? 'pdf-page:' + pageNum : '',
        subitems: Array.isArray(item.items) && item.items.length
          ? await Promise.all(item.items.map(resolve))
          : null,
      };
    }
    const resolved = await Promise.all(outline.map(resolve));
    return resolved.filter((it) => it.label && it.href);
  }
  async jumpToTocItem(item) {
    if (!this.viewer || !item || !item.href) return;
    const m = String(item.href).match(/^pdf-page:(\d+)$/);
    if (m) await this.jumpTo({ page: Number(m[1]), scrollY: 0 });
  }
  onRelocate(cb) { this._cb = cb; }
  destroy() {
    if (this.pdfDoc) { try { this.pdfDoc.destroy(); } catch (_) {} this.pdfDoc = null; }
    if (this.viewer) { try { this.container.removeChild(this.viewer); } catch (_) {} this.viewer = null; }
    this._cb = null;
  }
}

class TextEngine {
  static engineKey = 'text';
  constructor(container) {
    this.container = container;
    this.viewer = null;
    this._cb = null;
    this._scrollT = null;
  }
  async load(file) {
    const ext = extOf(file.name);
    const text = await file.text();
    this.viewer = document.createElement('div');
    Object.assign(this.viewer.style, {
      overflowY: 'auto', height: '100%', width: '100%',
      background: 'var(--panel)', color: 'var(--ink)',
    });
    if (ext === 'html' || ext === 'htm') {
      const iframe = document.createElement('iframe');
      iframe.setAttribute('sandbox', '');
      Object.assign(iframe.style, { width: '100%', height: '100%', border: 'none', background: '#fff' });
      iframe.srcdoc = text;
      this.viewer.appendChild(iframe);
    } else {
      const inner = document.createElement('div');
      Object.assign(inner.style, { maxWidth: '720px', margin: '0 auto', padding: '40px 20px 80px' });
      const pre = document.createElement('pre');
      Object.assign(pre.style, {
        whiteSpace: 'pre-wrap', wordWrap: 'break-word',
        fontFamily: 'Georgia, "Iowan Old Style", "Palatino Linotype", serif',
        fontSize: '17px', lineHeight: '1.7', margin: '0', color: 'var(--ink)',
      });
      pre.textContent = text;
      inner.appendChild(pre);
      this.viewer.appendChild(inner);
    }
    this.container.appendChild(this.viewer);
    this.viewer.addEventListener('scroll', () => this._onScroll());
  }
  _onScroll() {
    if (this._scrollT) clearTimeout(this._scrollT);
    this._scrollT = setTimeout(() => {
      if (this._cb) this._cb(this.getPosition());
    }, 300);
  }
  getPosition() {
    if (!this.viewer) return { fraction: 0 };
    const total = this.viewer.scrollHeight - this.viewer.clientHeight;
    const f = total > 0 ? this.viewer.scrollTop / total : 0;
    return { fraction: Math.max(0, Math.min(1, f)) };
  }
  async jumpTo(position) {
    if (!this.viewer || !position) return;
    const f = Math.max(0, Math.min(1, position.fraction || 0));
    const total = this.viewer.scrollHeight - this.viewer.clientHeight;
    this.viewer.scrollTop = f * total;
  }
  async getMetadata() { return {}; }   // No format-native metadata for plain text.
  async next() {
    if (!this.viewer) return;
    this.viewer.scrollBy({ top: this.viewer.clientHeight * 0.9, behavior: 'smooth' });
  }
  async prev() {
    if (!this.viewer) return;
    this.viewer.scrollBy({ top: -this.viewer.clientHeight * 0.9, behavior: 'smooth' });
  }
  async getTOC() { return null; }
  async jumpToTocItem() { /* no-op — TXT/MD/HTML have no chapter structure in v1 */ }
  onRelocate(cb) { this._cb = cb; }
  destroy() {
    if (this.viewer) { try { this.container.removeChild(this.viewer); } catch (_) {} this.viewer = null; }
    this._cb = null;
  }
}

// ============================================================
// Adding books — unified path
// Three entry points: standalone-dropzone, full-window drop, library "+ Add" button.
// Behavior:
//   - Standalone:        first supported file → openBookFromFile (preview-only, A4)
//   - Hosted, no folder: ignored — there's no library to write to
//   - Hosted + folder:   write all supported files to apps/books/library/<name>,
//                        re-list, and auto-open the just-added file when there's only one
// ============================================================

const libraryFileInput = document.getElementById('library-fileinput');
const dropOverlay = document.getElementById('drop-overlay');
const dropMsg = document.getElementById('drop-msg');
const toastEl = document.getElementById('toast');

// Lightweight toast — for add success/failure, capability errors, etc.
let toastTimer = null;
function showToast(message, opts = {}) {
  if (!toastEl) return;
  toastEl.textContent = message;
  toastEl.classList.toggle('is-error', !!opts.error);
  toastEl.classList.add('is-visible');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toastEl.classList.remove('is-visible');
  }, opts.duration || 3200);
}

function openLibraryFilePicker() {
  libraryFileInput.click();
}

async function handlePickedFiles(fileList) {
  if (!fileList || fileList.length === 0) return;
  const all = Array.from(fileList);

  if (!naklios.capabilities.hosted || !naklios.capabilities.fs) {
    // Standalone (or hosted without a folder) — preview the first supported file.
    const first = all.find((f) => engineKeyFor(f.name));
    if (first) await openBookFromFile(first, null);
    return;
  }

  // Hosted with fs — add to library.
  const supported = all.filter((f) => engineKeyFor(f.name));
  if (supported.length === 0) return;

  const added = await addBooksToLibrary(supported);
  await listLibrary();
  if (added.length === 1) {
    // Single file: jump straight into it.
    openBookFromLibrary(added[0]);
  }
}

async function addBooksToLibrary(files) {
  const added = [];
  const failures = [];
  for (const f of files) {
    try {
      const buf = await f.arrayBuffer();
      // Host's fsWrite uses FileSystemWritableFileStream.write(data) which
      // accepts ArrayBuffer / TypedArray / Blob / string. Pass Uint8Array.
      await naklios.fs.write('library/' + f.name, new Uint8Array(buf));
      added.push(f.name);
    } catch (err) {
      const msg = String(err && err.message || err);
      console.warn('Books: write failed for', f.name, err);
      failures.push({ name: f.name, message: msg });
    }
  }
  // Visible feedback so a silent host-side rejection doesn't look like nothing happened.
  if (failures.length && !added.length) {
    showToast("Couldn't add: " + failures[0].message, { error: true, duration: 5000 });
  } else if (failures.length) {
    showToast('Added ' + added.length + ', ' + failures.length + ' failed', { error: true, duration: 4500 });
  } else if (added.length === 1) {
    showToast('Added "' + added[0] + '"');
  } else if (added.length > 1) {
    showToast('Added ' + added.length + ' books');
  }
  return added;
}

// File picker change → unified handler. Reset input so picking the same file twice fires again.
libraryFileInput.addEventListener('change', (e) => {
  if (e.target.files) handlePickedFiles(e.target.files);
  e.target.value = '';
});

// Standalone preview card has its own inline dropzone (initialised when that view renders).
// Wired by the standalone view itself for visual affordance; the actual drop event also
// falls through to the document-level handler below (which preview-only-handles).
function wireDropZone() {
  const dz = document.getElementById('dropzone');
  const fi = document.getElementById('fileinput');
  if (!dz || !fi) return;
  fi.addEventListener('change', () => {
    if (fi.files && fi.files[0]) openBookFromFile(fi.files[0], null);
  });
  dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', (e) => {
    e.preventDefault();
    e.stopPropagation();    // don't double-fire with the document-level handler
    dz.classList.remove('drag-over');
    const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) openBookFromFile(f, null);
  });
}

// ============================================================
// Document-level drag-drop — works in any view except the reader.
// Shows a full-window overlay during drag, processes drop via handlePickedFiles.
// ============================================================

let dragDepth = 0;
function isFileDrag(e) {
  // dataTransfer.types is a DOMStringList in Firefox, array-like in others
  const types = e.dataTransfer && e.dataTransfer.types;
  if (!types) return false;
  return Array.from(types).includes('Files');
}
function setDropMsgForCurrentMode() {
  if (!naklios.capabilities.hosted || !naklios.capabilities.fs) {
    dropMsg.textContent = 'Drop to read (preview only)';
  } else {
    dropMsg.textContent = 'Drop to add to your library';
  }
}

document.addEventListener('dragenter', (e) => {
  if (!isFileDrag(e)) return;
  if (reader.classList.contains('is-open')) return;   // don't disturb reading
  dragDepth++;
  if (dragDepth === 1) {
    setDropMsgForCurrentMode();
    dropOverlay.hidden = false;
  }
});
document.addEventListener('dragover', (e) => {
  if (!isFileDrag(e)) return;
  if (reader.classList.contains('is-open')) return;
  e.preventDefault();   // required so the drop event fires
});
document.addEventListener('dragleave', (e) => {
  if (!isFileDrag(e)) return;
  dragDepth = Math.max(0, dragDepth - 1);
  if (dragDepth === 0) dropOverlay.hidden = true;
});
document.addEventListener('drop', (e) => {
  if (!isFileDrag(e)) return;
  e.preventDefault();
  e.stopPropagation();
  hideDropOverlay();
  if (reader.classList.contains('is-open')) return;
  const files = e.dataTransfer && e.dataTransfer.files;
  if (files && files.length) handlePickedFiles(files);
});

// dragend fires whenever a drag operation completes (drop or cancel),
// so it's a safety net for "drag started, drag never properly ended" cases
// where dragleave's depth-counting can desync.
document.addEventListener('dragend', hideDropOverlay);
window.addEventListener('blur', hideDropOverlay);

function hideDropOverlay() {
  dragDepth = 0;
  if (dropOverlay) dropOverlay.hidden = true;
}

// ============================================================
// Open / close — convergence point for library clicks and standalone drops
// ============================================================

async function openBookFromLibrary(filename) {
  enterReaderView(filename);
  setReaderLoading('Loading…');
  try {
    const bookId = await resolveBookId(filename);
    const raw = await naklios.fs.readBinary('library/' + filename);
    const buf = toArrayBuffer(raw);
    const file = new File([buf], filename);
    await openBookFromFile(file, { bookId, sourceFilename: filename });
  } catch (err) {
    showReaderError('Could not load <code>' + escapeHtml(filename) + '</code>', err);
  }
}

// persistInfo: { bookId, sourceFilename } when hosted; null when standalone (A4).
async function openBookFromFile(file, persistInfo) {
  // Enter reader view first so errors are visible — unsupported-format
  // and load failures both surface in the same place as successful loads.
  enterReaderView(file.name);
  setReaderLoading('Loading…');

  // Tear down any previous engine
  if (activeEngine) { try { activeEngine.destroy(); } catch (_) {} activeEngine = null; }
  activeSidecar = null;
  activeBookId = null;
  deactivateSidebar();

  const key = engineKeyFor(file.name);
  if (!key) {
    showReaderError(
      'Unsupported file type: <code>.' + escapeHtml(extOf(file.name)) + '</code>',
      new Error('Books v1 supports ePub, PDF, MOBI, AZW3, FB2, TXT, MD, HTML.'));
    return;
  }

  try {
    // Clear the loading indicator before the engine mounts its viewer.
    // Otherwise the engine's element renders on top of "Loading…" and engines
    // with transparent internals (e.g. foliate-view's shadow DOM during early
    // paginator settle) let the loading text bleed through.
    readerContent.innerHTML = '';
    activeEngine = new (ENGINES[key])(readerContent);
    console.log('Books: loading via', key, 'engine →', file.name, '(' + file.size + ' bytes)');
    await activeEngine.load(file);
    console.log('Books: engine.load resolved for', file.name);

    const persisted = !!(persistInfo && persistInfo.bookId && naklios.capabilities.fs);
    if (persisted) {
      activeBookId = persistInfo.bookId;
      activeSidecar = (await readSidecar(activeBookId))
        || makeInitialSidecar({
          bookId: activeBookId,
          sourceFilename: persistInfo.sourceFilename,
          engineKey: key,
        });

      // Lazy metadata enrichment
      if (!activeSidecar.title || !activeSidecar.author) {
        try {
          const meta = await activeEngine.getMetadata();
          if (meta && meta.title && !activeSidecar.title) activeSidecar.title = meta.title;
          if (meta && meta.author && !activeSidecar.author) activeSidecar.author = meta.author;
        } catch (_) {}
      }

      // Seed engine to last known position
      if (activeSidecar.position) {
        try { await activeEngine.jumpTo(activeSidecar.position); } catch (_) {}
      }

      // Update the displayed title with the real one if we got it
      if (activeSidecar.title && activeSidecar.title !== file.name.replace(/\.[a-z0-9]+$/i, '')) {
        setReaderTitleText(activeSidecar.title);
      }

      // Record open + initial position
      activeSidecar.lastOpened = new Date().toISOString();
      activeSidecar.position = activeEngine.getPosition();
      writeSidecarDebounced(activeBookId, activeSidecar);

      // Show + populate the bookmarks/note sidebar
      activateSidebarForCurrentBook();
    }

    activeEngine.onRelocate((pos) => {
      readerStatus.textContent = describePosition(key, pos);
      if (persisted && activeSidecar) {
        activeSidecar.position = pos;
        activeSidecar.lastOpened = new Date().toISOString();
        writeSidecarDebounced(activeBookId, activeSidecar);
      }
    });
    readerStatus.textContent = describePosition(key, activeEngine.getPosition());

    // Wire navigation controls now that the engine is live
    prevBtn.hidden = false;
    nextBtn.hidden = false;
    prevBtn.onclick = () => activeEngine && activeEngine.prev();
    nextBtn.onclick = () => activeEngine && activeEngine.next();

    // Populate TOC (sidebar Contents section). null/empty hides the section.
    let toc = null;
    try { toc = activeEngine.getTOC ? await activeEngine.getTOC() : null; } catch (_) {}
    renderTOC(toc);

    // Sidebar toggle is useful whenever there's content in the sidebar —
    // either persistence (bookmarks + note) or a TOC.
    if (persisted || (toc && toc.length)) sidebarToggle.hidden = false;
  } catch (err) {
    showReaderError('Could not render <code>' + escapeHtml(file.name) + '</code>', err);
  }
}

function describePosition(engineKey, pos) {
  if (!pos) return '';
  if (engineKey === 'pdf' && pos.page) {
    const pct = typeof pos.scrollY === 'number' ? Math.round(pos.scrollY * 100) : 0;
    return 'p.' + pos.page + (pct ? ' · ' + pct + '%' : '');
  }
  if (typeof pos.fraction === 'number') return Math.round(pos.fraction * 100) + '%';
  return '';
}

// ============================================================
// Bookmarks + per-book note (A9) — sidebar
// ============================================================

function renderBookmarks() {
  if (!activeSidecar) {
    bookmarksList.innerHTML = '<li class="bm-empty">No book open</li>';
    return;
  }
  if (!Array.isArray(activeSidecar.bookmarks)) activeSidecar.bookmarks = [];
  if (activeSidecar.bookmarks.length === 0) {
    bookmarksList.innerHTML = '<li class="bm-empty">No bookmarks yet</li>';
    return;
  }
  // Most-recently-added first.
  const list = activeSidecar.bookmarks.slice().sort((a, b) =>
    String(b.ts || '').localeCompare(String(a.ts || '')));
  const engineKey = activeSidecar.engine || 'text';
  bookmarksList.innerHTML = list.map((bm) => {
    const meta = describePosition(engineKey, bm.position) || '';
    const label = bm.label && bm.label.trim() ? bm.label.trim() : meta || 'Bookmark';
    return '<li data-id="' + escapeHtml(bm.id) + '">' +
             '<span class="bm-label">' + escapeHtml(label) + '</span>' +
             (bm.label && bm.label.trim() && meta ? '<span class="bm-meta">' + escapeHtml(meta) + '</span>' : '') +
             '<button class="bm-btn" data-action="rename" type="button" title="Rename">✎</button>' +
             '<button class="bm-btn" data-action="remove" type="button" title="Remove">×</button>' +
           '</li>';
  }).join('');
}

function handleAddBookmark() {
  if (!activeEngine || !activeSidecar || !activeBookId) return;
  const pos = activeEngine.getPosition();
  if (!Array.isArray(activeSidecar.bookmarks)) activeSidecar.bookmarks = [];
  activeSidecar.bookmarks.push({
    id: 'bm_' + Math.random().toString(36).slice(2, 10),
    label: '',
    ts: new Date().toISOString(),
    position: pos,
  });
  writeSidecarDebounced(activeBookId, activeSidecar);
  renderBookmarks();
}

async function handleBookmarkClick(e) {
  if (!activeSidecar || !activeEngine || !activeBookId) return;
  const li = e.target.closest('li[data-id]');
  if (!li) return;
  const id = li.dataset.id;
  const bm = (activeSidecar.bookmarks || []).find((b) => b.id === id);
  if (!bm) return;

  const action = e.target.dataset.action;
  if (action === 'remove') {
    activeSidecar.bookmarks = activeSidecar.bookmarks.filter((b) => b.id !== id);
    writeSidecarDebounced(activeBookId, activeSidecar);
    renderBookmarks();
    return;
  }
  if (action === 'rename') {
    const label = prompt('Bookmark label:', bm.label || '');
    if (label != null) {
      bm.label = String(label).trim();
      writeSidecarDebounced(activeBookId, activeSidecar);
      renderBookmarks();
    }
    return;
  }
  // Bare row click → jump
  try { await activeEngine.jumpTo(bm.position); } catch (_) {}
}

function handleNoteInput() {
  if (!activeSidecar || !activeBookId) return;
  activeSidecar.note = noteArea.value;
  writeSidecarDebounced(activeBookId, activeSidecar);
}

function openSidebarPanel() {
  sidebar.classList.add('is-open');
  sidebar.setAttribute('aria-hidden', 'false');
  sidebarToggle.classList.add('is-active');
}
function closeSidebarPanel() {
  sidebar.classList.remove('is-open');
  sidebar.setAttribute('aria-hidden', 'true');
  sidebarToggle.classList.remove('is-active');
}
function toggleSidebarPanel() {
  if (sidebar.classList.contains('is-open')) closeSidebarPanel();
  else openSidebarPanel();
}

// Populate the sidebar surfaces for the currently-active book. Called from openBookFromFile.
function activateSidebarForCurrentBook() {
  sidebarToggle.hidden = false;
  noteArea.value = (activeSidecar && typeof activeSidecar.note === 'string') ? activeSidecar.note : '';
  noteArea.disabled = false;
  addBookmarkBtn.disabled = false;
  renderBookmarks();
}
function deactivateSidebar() {
  closeSidebarPanel();
  sidebarToggle.hidden = true;
  noteArea.value = '';
  noteArea.disabled = true;
  addBookmarkBtn.disabled = true;
  bookmarksList.innerHTML = '';
}

sidebarToggle.addEventListener('click', toggleSidebarPanel);
addBookmarkBtn.addEventListener('click', handleAddBookmark);
bookmarksList.addEventListener('click', handleBookmarkClick);
noteArea.addEventListener('input', handleNoteInput);

// ============================================================
// Table of contents — sidebar Contents section
// ============================================================

function renderTOC(toc) {
  if (!Array.isArray(toc) || toc.length === 0) {
    tocSection.hidden = true;
    tocList.innerHTML = '';
    return;
  }
  function build(items) {
    return items.map((item) => {
      const label = escapeHtml(item.label || '');
      const href = escapeHtml(item.href || '');
      const sub = (Array.isArray(item.subitems) && item.subitems.length)
        ? '<ul>' + build(item.subitems) + '</ul>'
        : '';
      return '<li>' +
               '<button class="toc-item" type="button" data-href="' + href + '" title="' + label + '">' +
                 label +
               '</button>' + sub +
             '</li>';
    }).join('');
  }
  tocList.innerHTML = build(toc);
  tocSection.hidden = false;
}

tocList.addEventListener('click', async (e) => {
  const btn = e.target.closest('.toc-item');
  if (!btn || !activeEngine) return;
  const href = btn.getAttribute('data-href') || '';
  try { await activeEngine.jumpToTocItem({ href, label: btn.textContent }); }
  catch (err) { console.warn('Books: jumpToTocItem failed', err); }
});

// ============================================================
// Reader-view UX
// ============================================================

function setReaderTitleText(t) {
  readerTitle.textContent = t;
  naklios.title('Books — ' + t);
}

function enterReaderView(filename) {
  const guessed = filename.replace(/\.[a-z0-9]+$/i, '');
  setReaderTitleText(guessed);
  readerStatus.textContent = '';
  reader.classList.add('is-open');
  reader.setAttribute('aria-hidden', 'false');
  topbar.style.display = 'none';
  root.style.display = 'none';
  // Defensive: any drag state that survived into the reader view would put the
  // overlay on top (it has higher z-index than the reader). Wipe it out.
  hideDropOverlay();
}

function exitReaderView() {
  flushPendingWritesSync();
  if (activeEngine) { try { activeEngine.destroy(); } catch (_) {} activeEngine = null; }
  activeSidecar = null;
  activeBookId = null;
  readerContent.innerHTML = '';
  // Tear down navigation + TOC
  prevBtn.hidden = true; prevBtn.onclick = null;
  nextBtn.hidden = true; nextBtn.onclick = null;
  renderTOC(null);
  deactivateSidebar();
  reader.classList.remove('is-open');
  reader.setAttribute('aria-hidden', 'true');
  topbar.style.display = '';
  root.style.display = '';
  naklios.title('Books');
  // Re-list library so any sidecar updates from this session show up
  if (naklios.capabilities.fs) listLibrary();
}

backBtn.addEventListener('click', exitReaderView);

function setReaderLoading(msg) {
  readerContent.innerHTML = '<div class="loading">' + escapeHtml(msg) + '</div>';
}
function showReaderError(htmlMsg, err) {
  const detail = err && err.message ? err.message : '';
  readerContent.innerHTML =
    '<div class="reader-error">' +
      '<h3>Couldn\'t open this book</h3>' +
      '<p>' + htmlMsg + '</p>' +
      (detail ? '<p style="font-size:12px; opacity:0.7;"><code>' + escapeHtml(detail) + '</code></p>' : '') +
    '</div>';
  if (err) console.error('Books:', err);
  // Also surface via toast — covers the case where the reader chrome is
  // somehow obscured (eg drop overlay stuck), so the user at least sees
  // the failure mode instead of a frozen window.
  showToast("Couldn't open: " + (detail || 'unknown error'), { error: true, duration: 6000 });
}

// ============================================================
// Library listing (hosted) — A6 scan-on-load with sidecar decoration
// ============================================================

// Strip a leading "<prefix>/" from every entry returned by naklios.fs.list.
// The host returns entries as paths relative to apps/<id>/ — so listing
// 'library/' yields ['library/Pride.epub', ...]. Books works in basenames,
// so peel off the prefix once at the boundary.
function stripListPrefix(entries, prefix) {
  if (!Array.isArray(entries)) return [];
  const p = prefix.replace(/\/$/, '') + '/';
  return entries
    .map((e) => {
      if (typeof e !== 'string' || !e) return null;
      return e.startsWith(p) ? e.slice(p.length) : e;
    })
    .filter(Boolean);
}

async function listLibrary() {
  try {
    const [libRaw, noteRaw] = await Promise.all([
      naklios.fs.list('library/'),
      naklios.fs.list('notes/').catch(() => []),
    ]);
    const libEntries = stripListPrefix(libRaw, 'library');
    const noteEntries = stripListPrefix(noteRaw, 'notes');

    const books = libEntries.filter((name) => {
      if (typeof name !== 'string' || !name) return false;
      if (name.charAt(name.length - 1) === '/') return false;
      return SUPPORTED_EXTS.indexOf(extOf(name)) !== -1;
    });

    // Build sourceFilename → sidecar index from notes/
    const noteFiles = noteEntries.filter((n) => typeof n === 'string' && n.endsWith('.json'));
    const sidecarByFilename = new Map();
    await Promise.all(noteFiles.map(async (n) => {
      try {
        const txt = await naklios.fs.read('notes/' + n);
        const s = JSON.parse(txt);
        if (s && s.sourceFilename) sidecarByFilename.set(s.sourceFilename, s);
      } catch (_) { /* skip malformed sidecars */ }
    }));

    const decorated = books.map((filename) => ({
      filename,
      sidecar: sidecarByFilename.get(filename) || null,
    }));

    // Sort: lastOpened desc (sidecar'd first), then alphabetical for the rest
    decorated.sort((a, b) => {
      const aT = (a.sidecar && a.sidecar.lastOpened) ? Date.parse(a.sidecar.lastOpened) : 0;
      const bT = (b.sidecar && b.sidecar.lastOpened) ? Date.parse(b.sidecar.lastOpened) : 0;
      if (aT !== bT) return bT - aT;
      return a.filename.localeCompare(b.filename);
    });

    if (decorated.length === 0) renderLibraryEmpty();
    else renderLibrary(decorated);
  } catch (err) {
    console.error('Books: library listing failed', err);
    renderLibraryEmpty();
  }
}

// ============================================================
// Theme
// ============================================================

function applyHostTheme(theme) {
  if (!theme || !theme.colors) return;
  const c = theme.colors;
  const s = document.documentElement.style;
  if (c.body)  s.setProperty('--body',  c.body);
  if (c.panel) s.setProperty('--panel', c.panel);
  if (c.ink)   s.setProperty('--ink',   c.ink);
  if (c.brand) s.setProperty('--brand', c.brand);
  if (c.row)   s.setProperty('--row',   c.row);
  if (c.line)  s.setProperty('--line',  c.line);
}

// ============================================================
// Boot
// ============================================================

function boot() {
  naklios.ready();
  naklios.title('Books');

  if (!naklios.capabilities.hosted) {
    renderStandalonePreview();
    return;
  }

  let decided = false;
  function decide() {
    if (decided) return;
    decided = true;
    if (!naklios.capabilities.fs) renderHostedNoFolder();
    else listLibrary();
  }
  naklios.onCapabilitiesChange((caps) => { if (caps.fs && !decided) decide(); });
  naklios.requestCapabilities();
  setTimeout(decide, 1500);

  naklios.theme.onChange(applyHostTheme);
  naklios.theme.request();

  // Re-scan on window focus (A6 — scan-on-load + on focus, debounced).
  let rescanT = null;
  window.addEventListener('focus', () => {
    if (!naklios.capabilities.fs) return;
    if (reader.classList.contains('is-open')) return;   // don't trample reading
    clearTimeout(rescanT);
    rescanT = setTimeout(listLibrary, 500);
  });

  // Flush pending sidecar writes on close
  window.addEventListener('beforeunload', flushPendingWritesSync);
  naklios.beforeClose(flushPendingWritesSync);

  // Keyboard navigation in the reader view.
  // Skipped while focus is in an input/textarea/contentEditable so typing notes
  // and bookmark labels doesn't trigger page flips.
  window.addEventListener('keydown', async (e) => {
    if (!reader.classList.contains('is-open')) return;
    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
    if (e.key === 'ArrowRight' || e.code === 'Space' || e.key === ' ') {
      e.preventDefault();
      if (activeEngine && activeEngine.next) await activeEngine.next();
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      if (activeEngine && activeEngine.prev) await activeEngine.prev();
    } else if (e.key === 'Escape') {
      e.preventDefault();
      exitReaderView();
    }
  });
}

boot();
</script>
